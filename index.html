<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalas de Extra do Plantão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        /* animação de piscar para botão salvar */
        @keyframes pulseSave {
          0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); transform: translateY(0); }
          50% { box-shadow: 0 0 12px 6px rgba(99,102,241,0.12); transform: translateY(-1px); }
          100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.0); transform: translateY(0); }
        }
        .save-pulse {
          animation: pulseSave 1.2s infinite;
          outline: 2px solid rgba(99,102,241,0.12);
        }
        /* botão de deletar */
        .delete-btn { background: transparent; border: none; color: #f87171; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-white">Escalas de Extra do Plantão</h1>
        <button id="save-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-bold transition" onclick="saveData()">Salvar Alterações</button>
    </header>

    <main class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
        <!-- Coluna de Usuários -->
        <aside class="w-full md:w-64 bg-slate-900 border border-slate-800 rounded-xl p-4 h-fit">
            <h2 class="text-sm font-bold text-slate-500 uppercase mb-4">Colaboradores</h2>
            <div id="user-list" class="space-y-2"></div>
        </aside>

        <!-- Calendário -->
        <section class="flex-grow bg-slate-900 border border-slate-800 rounded-xl p-6">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="p-2 bg-slate-800 rounded-lg hover:bg-slate-700">◀</button>
                <h2 id="month-year" class="text-xl font-bold capitalize">Carregando...</h2>
                <button onclick="changeMonth(1)" class="p-2 bg-slate-800 rounded-lg hover:bg-slate-700">▶</button>
            </div>
            <div class="calendar-grid text-center text-xs font-bold text-slate-500 mb-2">
                <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
            </div>
            <div id="calendar-grid" class="calendar-grid gap-2"></div>
        </section>

        <!-- Painel de Vagas -->
        <aside class="w-full md:w-80 bg-slate-900 border border-slate-800 rounded-xl p-6">
            <h2 id="day-title" class="font-bold text-lg mb-4">Selecione um dia</h2>
            <div id="shifts-list" class="space-y-3 mb-6"></div>
            <div class="border-t border-slate-800 pt-4">
                <input type="text" id="new-shift-input" placeholder="Ex: 08h-20h" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm mb-2 outline-none focus:ring-1 focus:ring-indigo-500">
                <button onclick="addShift()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded-lg text-sm">Adicionar Vaga</button>
            </div>
        </aside>
    </main>

    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

  // Seu firebaseConfig
  const firebaseConfig = {
    apiKey: "AIzaSyCbjdviI4dYlyvSuMYrqupU0TW-aMUntoA",
    authDomain: "escalas-do-plantao-81ae2.firebaseapp.com",
    databaseURL: "https://escalas-do-plantao-81ae2-default-rtdb.firebaseio.com",
    projectId: "escalas-do-plantao-81ae2",
    storageBucket: "escalas-do-plantao-81ae2.firebasestorage.app",
    messagingSenderId: "545888551770",
    appId: "1:545888551770:web:381cd7cbf5e138013c2963",
    measurementId: "G-VNDR0J2KC6"
  };

  // Inicializa Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'escala_dados');

  // Estado local
  let data = { shifts: {} };
  let currentView = new Date();
  let selectedDate = null;
  let dirty = false; // indica alterações não salvas
  const SAVE_BACKUP_KEY = 'escala_backup_v1';

  // Utilitários de backup local
  function backupLocal() {
    try {
      localStorage.setItem(SAVE_BACKUP_KEY, JSON.stringify(data));
    } catch (e) {
      console.warn("Não foi possível salvar backup local:", e);
    }
  }
  function clearLocalBackup() {
    try { localStorage.removeItem(SAVE_BACKUP_KEY); } catch(e){}
  }
  function getLocalBackup() {
    try { return JSON.parse(localStorage.getItem(SAVE_BACKUP_KEY)); } catch(e){ return null; }
  }

  // Marca como sujo e atualiza UI do botão salvar
  function setDirty(val = true) {
    dirty = val;
    const btn = document.getElementById('save-btn');
    if (dirty) {
      btn.classList.add('save-pulse');
      btn.innerText = "Salvar Alterações *";
      backupLocal();
    } else {
      btn.classList.remove('save-pulse');
      btn.innerText = "Salvar Alterações";
      clearLocalBackup();
    }
  }

  // Escuta em tempo real do Firebase
  onValue(dbRef, (snapshot) => {
    const remote = snapshot.val() || { shifts: {} };
    // Se houver backup local e for diferente do remoto, perguntar ao usuário
    const backup = getLocalBackup();
    if (backup && JSON.stringify(backup) !== JSON.stringify(remote)) {
      // Pergunta simples: restaurar backup local?
      const restore = confirm("Existe um backup local com alterações não salvas. Deseja restaurar essas alterações locais e salvá-las no servidor?");
      if (restore) {
        data = backup;
        // salva imediatamente no Firebase
        saveData();
        return;
      } else {
        // descarta backup e usa remoto
        clearLocalBackup();
      }
    }
    data = remote;
    setDirty(false); // dados sincronizados com o servidor
    render();
  }, (error) => {
    console.error("Erro ao escutar o banco:", error);
  });

  // Salva dados no Firebase
  window.saveData = async function() {
    const btn = document.getElementById('save-btn');
    btn.innerText = "Salvando...";
    try {
      await set(dbRef, data);
      setDirty(false);
      btn.innerText = "Salvo!";
      setTimeout(() => { if (!dirty) btn.innerText = "Salvar Alterações"; }, 1500);
    } catch (e) {
      alert("Erro ao salvar! Verifique sua conexão.");
      console.error(e);
      btn.innerText = "Salvar Alterações";
    }
  };

  // Renderização
  function render() {
    document.getElementById('month-year').innerText = currentView.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    renderCalendar();
    renderUsers();
    renderShifts();
  }

  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    const firstDay = new Date(currentView.getFullYear(), currentView.getMonth(), 1).getDay();
    const daysInMonth = new Date(currentView.getFullYear(), currentView.getMonth() + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentView.getFullYear()}-${String(currentView.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const shifts = data.shifts[dateStr] || [];
      const div = document.createElement('div');
      div.className = `h-24 bg-slate-800 rounded-lg p-2 cursor-pointer hover:ring-1 hover:ring-indigo-500 ${selectedDate === dateStr ? 'ring-2 ring-indigo-500' : ''}`;
      div.innerHTML = `<div class="font-bold text-lg mb-1">${d}</div><div class="flex flex-wrap gap-1">${shifts.map(s => `<div class="w-2 h-2 rounded-full ${s.name ? 'bg-red-500' : 'bg-emerald-500'}"></div>`).join('')}</div>`;
      div.onclick = () => { selectedDate = dateStr; render(); };
      grid.appendChild(div);
    }
  }

  function renderUsers() {
    const userList = document.getElementById('user-list');
    userList.innerHTML = '';
    const users = new Set();
    Object.values(data.shifts).flat().forEach(s => { if (s.name) users.add(s.name); });
    users.forEach(u => userList.innerHTML += `<div class="text-sm bg-slate-800 p-2 rounded">${u}</div>`);
  }

  function renderShifts() {
    if (!selectedDate) {
      document.getElementById('day-title').innerText = 'Selecione um dia';
      document.getElementById('shifts-list').innerHTML = '';
      return;
    }
    document.getElementById('day-title').innerText = `Dia ${selectedDate.split('-').reverse().join('/')}`;
    const list = document.getElementById('shifts-list');
    list.innerHTML = '';
    (data.shifts[selectedDate] || []).forEach((s, idx) => {
      list.innerHTML += `
        <div class="p-3 bg-slate-800 rounded-lg border border-slate-700 flex items-start justify-between gap-3">
          <div class="flex-1">
            <div class="text-xs font-bold mb-1 ${s.name ? 'text-red-400' : 'text-emerald-400'}">${s.label}</div>
            <input type="text" value="${s.name || ''}" placeholder="Nome..." class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm" onchange="updateName('${selectedDate}', ${idx}, this.value)">
          </div>
          <div class="flex flex-col items-end gap-2">
            <button class="delete-btn" onclick="deleteShift('${selectedDate}', ${idx})" title="Deletar vaga">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7L5 7M10 11v6m4-6v6M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12" />
              </svg>
            </button>
          </div>
        </div>`;
    });
  }

  // Manipulação de dados
  window.updateName = function(date, idx, val) {
    if (!data.shifts[date]) return;
    data.shifts[date][idx].name = val;
    setDirty(true);
    render();
  };

  window.addShift = function() {
    const input = document.getElementById('new-shift-input');
    if (!selectedDate || !input.value) return;
    if (!data.shifts[selectedDate]) data.shifts[selectedDate] = [];
    data.shifts[selectedDate].push({ label: input.value, name: '' });
    input.value = '';
    setDirty(true);
    render();
  };

  window.deleteShift = function(date, idx) {
    if (!data.shifts[date]) return;
    const ok = confirm("Deseja realmente deletar esta vaga?");
    if (!ok) return;
    data.shifts[date].splice(idx, 1);
    if (data.shifts[date].length === 0) delete data.shifts[date];
    setDirty(true);
    render();
  };

  window.changeMonth = function(dir) { currentView.setMonth(currentView.getMonth() + dir); render(); };

  // Antes de fechar a aba: se houver alterações não salvas, pede confirmação
  window.addEventListener('beforeunload', function (e) {
    if (!dirty) return;
    // salva backup local (já feito em setDirty, mas reforça)
    backupLocal();
    // padrão para disparar o diálogo do navegador
    e.preventDefault();
    e.returnValue = '';
    return '';
  });

  // Ao carregar, se houver backup local e DB vazio/diferente, o onValue já perguntará.
  // Força um render inicial enquanto espera o onValue
  render();
</script>

</body>
</html>
