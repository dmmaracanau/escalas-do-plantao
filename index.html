<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalas de Extra do Plantão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        .save-pulse { animation: pulseSave 1.2s infinite; outline: 2px solid rgba(99,102,241,0.12); }
        @keyframes pulseSave {
            0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); transform: translateY(0); }
            50% { box-shadow: 0 0 12px 6px rgba(99,102,241,0.12); transform: translateY(-1px); }
            100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.0); transform: translateY(0); }
        }
        .delete-btn { color: #f87171; cursor: pointer; }
        .edit-btn { color: #60a5fa; cursor: pointer; }
        .eq-A { color: #60a5fa; } .eq-B { color: #fbbf24; } .eq-C { color: #f87171; } .eq-D { color: #34d399; }
        .selected-officer { border: 1px solid #6366f1; background-color: #312e81 !important; }
        .highlight-day { border: 2px solid #fbbf24 !important; box-shadow: 0 0 10px rgba(251,191,36,0.3); }
        .empty-day { opacity: 0.3; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-white">Escalas de Extra do Plantão</h1>
        <button id="save-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-bold transition" onclick="saveData()">Salvar Alterações</button>
    </header>

    <main class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-64 bg-slate-900 border border-slate-800 rounded-xl p-4 h-fit">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-slate-500 uppercase">OIP (Total Horas)</h2>
                <button onclick="clearSelection()" class="text-[10px] bg-slate-800 px-2 py-1 rounded hover:bg-slate-700 uppercase">Limpar</button>
            </div>
            <div id="user-list" class="space-y-2"></div>
        </aside>

        <section class="flex-grow bg-slate-900 border border-slate-800 rounded-xl p-6">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="p-2 bg-slate-800 rounded-lg hover:bg-slate-700">◀</button>
                <h2 id="month-year" class="text-xl font-bold capitalize">Carregando...</h2>
                <button onclick="changeMonth(1)" class="p-2 bg-slate-800 rounded-lg hover:bg-slate-700">▶</button>
            </div>
            <div class="calendar-grid text-center text-xs font-bold text-slate-500 mb-2">
                <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
            </div>
            <div id="calendar-grid" class="calendar-grid gap-2"></div>
        </section>

        <aside class="w-full md:w-80 bg-slate-900 border border-slate-800 rounded-xl p-6">
            <h2 id="day-title" class="font-bold text-lg mb-1">Selecione um dia</h2>
            <div id="team-badge" class="font-black text-3xl mb-4"></div>
            <div id="shifts-list" class="space-y-3 mb-6"></div>
            <div class="border-t border-slate-800 pt-4">
                <input type="text" id="new-shift-input" placeholder="Ex: 08h-20h" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm mb-2 outline-none focus:ring-1 focus:ring-indigo-500">
                <button onclick="addShift()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded-lg text-sm">Adicionar Vaga</button>
            </div>
        </aside>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCbjdviI4dYlyvSuMYrqupU0TW-aMUntoA", authDomain: "escalas-do-plantao-81ae2.firebaseapp.com", databaseURL: "https://escalas-do-plantao-81ae2-default-rtdb.firebaseio.com", projectId: "escalas-do-plantao-81ae2", storageBucket: "escalas-do-plantao-81ae2.firebasestorage.app", messagingSenderId: "545888551770", appId: "1:545888551770:web:381cd7cbf5e138013c2963", measurementId: "G-VNDR0J2KC6" };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'escala_dados');

        let data = { shifts: {} };
        let currentView = new Date();
        let selectedDate = null;
        let selectedOfficers = [];
        let dirty = false;

        window.getEquipe = function(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const target = new Date(y, m - 1, d);
            const start = new Date(2026, 6, 1);
            const diffDays = Math.floor((target - start) / (1000 * 60 * 60 * 24));
            const equipes = ['A', 'B', 'C', 'D'];
            return equipes[((diffDays % 4) + 4) % 4];
        };

        window.clearSelection = function() { selectedOfficers = []; render(); };

        function setDirty(val = true) { dirty = val; const btn = document.getElementById('save-btn'); if (dirty) { btn.classList.add('save-pulse'); btn.innerText = "Salvar Alterações *"; } else { btn.classList.remove('save-pulse'); btn.innerText = "Salvar Alterações"; } }

        onValue(dbRef, (snapshot) => { data = snapshot.val() || { shifts: {} }; render(); });

        window.saveData = async function() { try { await set(dbRef, data); setDirty(false); } catch (e) { alert("Erro ao salvar."); } };

        function render() {
            document.getElementById('month-year').innerText = currentView.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            renderCalendar(); renderUsers(); renderShifts();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const firstDay = new Date(currentView.getFullYear(), currentView.getMonth(), 1).getDay();
            const daysInMonth = new Date(currentView.getFullYear(), currentView.getMonth() + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentView.getFullYear()}-${String(currentView.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const eq = getEquipe(dateStr);
                const shifts = data.shifts[dateStr] || [];
                const hasShift = selectedOfficers.length > 0 && shifts.some(s => selectedOfficers.includes(s.name));
                const isEmpty = shifts.length === 0;
                
                const div = document.createElement('div');
                div.className = `h-24 bg-slate-800 rounded-lg p-2 cursor-pointer hover:ring-1 hover:ring-indigo-500 flex flex-col justify-between ${selectedDate === dateStr ? 'ring-2 ring-indigo-500' : ''} ${hasShift ? 'highlight-day' : ''} ${isEmpty ? 'empty-day' : ''}`;
                div.innerHTML = `<div class="flex justify-between items-start"><span class="font-bold text-lg">${d}</span><span class="text-xs font-black eq-${eq}">${eq}</span></div><div class="flex flex-wrap gap-1">${shifts.map(s => `<div class="w-2 h-2 rounded-full ${s.name ? 'bg-red-500' : 'bg-emerald-500'}"></div>`).join('')}</div>`;
                div.onclick = () => { selectedDate = dateStr; render(); };
                grid.appendChild(div);
            }
        }

        function renderUsers() {
            const userList = document.getElementById('user-list'); userList.innerHTML = '';
            const userCounts = {};
            Object.values(data.shifts).flat().forEach(s => { if (s.name) userCounts[s.name] = (userCounts[s.name] || 0) + 1; });
            
            Object.keys(userCounts).sort().forEach(u => {
                const isSelected = selectedOfficers.includes(u);
                const totalHours = userCounts[u] * 12;
                const div = document.createElement('div');
                div.className = `text-sm p-2 rounded cursor-pointer hover:bg-indigo-900 flex justify-between ${isSelected ? 'selected-officer' : 'bg-slate-800'}`;
                div.innerHTML = `<span>${u}</span> <span class="font-bold text-emerald-400">${totalHours}h</span>`;
                div.onclick = () => { 
                    if (isSelected) selectedOfficers = selectedOfficers.filter(o => o !== u);
                    else selectedOfficers.push(u);
                    render(); 
                };
                userList.appendChild(div);
            });
        }

        function renderShifts() {
            if (!selectedDate) { document.getElementById('day-title').innerText = 'Selecione um dia'; document.getElementById('team-badge').innerHTML = ''; document.getElementById('shifts-list').innerHTML = ''; return; }
            const eq = getEquipe(selectedDate);
            document.getElementById('day-title').innerText = `Dia ${selectedDate.split('-').reverse().join('/')}`;
            document.getElementById('team-badge').innerHTML = `<span class="eq-${eq}">EQUIPE ${eq}</span>`;
            const list = document.getElementById('shifts-list'); list.innerHTML = '';
            (data.shifts[selectedDate] || []).forEach((s, idx) => {
                list.innerHTML += `<div class="p-3 bg-slate-800 rounded-lg border border-slate-700 space-y-2">
                    <div class="flex justify-between items-center">
                        <input type="text" id="label-${idx}" value="${s.label}" readonly class="bg-transparent text-emerald-400 font-bold text-sm w-32 outline-none border-b border-transparent focus:border-indigo-500">
                        <div class="flex gap-2">
                            <span class="edit-btn" onclick="toggleEdit(${idx})">✏️</span>
                            <span class="delete-btn" onclick="deleteShift('${selectedDate}', ${idx})">✕</span>
                        </div>
                    </div>
                    <input type="text" value="${s.name || ''}" placeholder="Digite corretamente seu nome aqui, respeitando a escrita. Ex. João" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm" onchange="updateName('${selectedDate}', ${idx}, this.value)">
                </div>`;
            });
        }

        window.toggleEdit = function(idx) {
            const el = document.getElementById('label-' + idx);
            if (el.hasAttribute('readonly')) { el.removeAttribute('readonly'); el.focus(); el.classList.add('bg-slate-700'); }
            else { el.setAttribute('readonly', true); el.classList.remove('bg-slate-700'); updateLabel('${selectedDate}', idx, el.value); }
        };
        window.updateName = function(date, idx, val) { data.shifts[date][idx].name = val; setDirty(true); render(); };
        window.updateLabel = function(date, idx, val) { data.shifts[date][idx].label = val; setDirty(true); render(); };
        window.addShift = function() { const input = document.getElementById('new-shift-input'); if (!selectedDate || !input.value) return; if (!data.shifts[selectedDate]) data.shifts[selectedDate] = []; data.shifts[selectedDate].push({ label: input.value, name: '' }); input.value = ''; setDirty(true); render(); };
        window.deleteShift = function(date, idx) { data.shifts[date].splice(idx, 1); if (data.shifts[date].length === 0) delete data.shifts[date]; setDirty(true); render(); };
        window.changeMonth = function(dir) { currentView.setMonth(currentView.getMonth() + dir); render(); };
        render();
    </script>
</body>
</html>
